name: Sync deer-flow-bdev from upstream

on:
  schedule:
    - cron: "0 7 * * 1"  # Chaque lundi à 7h UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          repository: benewende-dev/deer-flow-bdev
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/bytedance/deer-flow.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count 2>/dev/null || echo "0")
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Commits behind upstream: $BEHIND"

      - name: Create sync branch
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout -b sync/upstream-$(date +%Y-%m-%d)
          git merge upstream/main --no-edit --allow-unrelated-histories || true

      - name: Push sync branch
        if: steps.check.outputs.behind != '0'
        run: |
          git push origin sync/upstream-$(date +%Y-%m-%d)

      - name: Create Pull Request
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          title: "⬆️ Sync upstream deer-flow — $(date +%Y-%m-%d)"
          body: |
            ## Mise à jour depuis deer-flow upstream

            **Commits en retard :** ${{ steps.check.outputs.behind }}

            ### À vérifier avant de merger :
            - [ ] Compatibilité avec notre config LangGraph
            - [ ] Pas de changements breaking sur les APIs agents
            - [ ] Variables d'env inchangées

            > Généré automatiquement chaque lundi.
          branch: sync/upstream-$(date +%Y-%m-%d)
          base: main
          labels: "sync,upstream"
